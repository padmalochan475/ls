<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Verification Code</title>
    <style type="text/css">
        body,
        table,
        td,
        a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            outline: none;
            text-decoration: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
        }

        @media screen and (max-width: 600px) {
            .wrapper {
                width: 100% !important;
                max-width: 100% !important;
            }

            .content-padding {
                padding: 24px !important;
            }

            .otp-code {
                font-size: 32px !important;
                letter-spacing: 4px !important;
            }

            .header-text {
                font-size: 24px !important;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #0f172a;">

    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 20px 0;">

                <table border="0" cellpadding="0" cellspacing="0" width="100%" class="wrapper"
                    style="max-width: 500px; background-color: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #334155;">

                    <!-- Gradient Top Bar -->
                    <tr>
                        <td style="height: 4px; background: linear-gradient(90deg, #60a5fa, #a78bfa);"></td>
                    </tr>

                    <!-- Header -->
                    <tr>
                        <td align="center" class="content-padding" style="padding: 40px 40px 20px 40px;">
                            <!-- IMAGE ICON (Safe for all clients) -->
                            <!-- Using a public CDN image for the lock -->
                            <img src="https://img.icons8.com/fluency/96/security-checked.png" alt="Security" width="56"
                                height="56" style="display: block; width: 56px; height: 56px;" />

                            <h1 class="header-text"
                                style="margin: 20px 0 0 0; color: #ffffff; font-size: 26px; font-weight: 700; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
                                Verification Code</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td align="center" class="content-padding" style="padding: 0 40px 30px 40px;">
                            <p class="info-text"
                                style="margin: 0 0 20px 0; color: #94a3b8; font-size: 16px; line-height: 1.5;">
                                Hello {{to_name}}, please use the following code to access your admin dashboard.
                            </p>

                            <!-- Code Box -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center"
                                        style="background: #0f172a; border-radius: 8px; border: 1px solid #475569; padding: 20px 0;">
                                        <div class="otp-code"
                                            style="font-family: monospace; font-size: 36px; font-weight: 700; color: #38bdf8; letter-spacing: 6px;">
                                            {{passcode}}
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" class="content-padding" style="padding: 0 40px 40px 40px;">
                            <p style="margin: 0; color: #64748b; font-size: 13px; line-height: 1.6;">
                                Requested at: <strong style="color: #94a3b8;">{{time}}</strong><br>
                                This code will expire in 10 minutes.
                            </p>
                        </td>
                    </tr>

                </table>

                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px;">
                    <tr>
                        <td align="center" style="padding-top: 20px;">
                            <p style="margin: 0; color: #475569; font-size: 12px;">
                                © 2026 LAMS Platform
                            </p>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
